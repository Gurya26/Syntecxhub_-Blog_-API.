<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>My Blog Website</title>

  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <div class="container">

    <div class="top-bar">

      <h1>🚀 My Blog Website</h1>

      <button id="themeToggle">🌙 Theme</button>

    </div>

    <input
      type="text"
      id="searchInput"
      placeholder="🔍 Search blogs..."
    />

    <form id="blogForm">

      <input
        type="text"
        id="title"
        placeholder="Enter blog title"
        required
      />

      <textarea
        id="content"
        placeholder="Write your blog content"
        required
      ></textarea>

      <button type="submit">
        Publish Blog
      </button>

    </form>

    <h2 class="published-heading">
      📚 Published Blogs
    </h2>

    <div id="blogsContainer"></div>

  </div>

  <script src="script.js"></script>

</body>

</html>
