<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SyntecxHub Blog Platform</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>🚀 SyntecxHub Blog Platform</h1>

    <!-- LOGIN -->

    <div class="login-box">

      <input type="text" id="username" placeholder="Username">

      <input type="password" id="password" placeholder="Password">

      <button onclick="register()">Register</button>

      <button onclick="login()">Login</button>

    </div>


    <!-- SEARCH -->

    <div class="top-bar">

      <input type="text" id="searchInput" placeholder="🔍 Search blogs...">

      <button id="themeBtn">🌙 Theme</button>

    </div>


    <!-- BLOG FORM -->

    <form id="blogForm">

      <input type="text" id="title" placeholder="Enter blog title" required>

      <textarea id="content" placeholder="Write your blog content" required></textarea>

      <input type="file" id="image">

      <button type="submit">Publish Blog</button>

    </form>


    <!-- BLOGS -->

    <div id="blogsContainer">

      <h2>Loading blogs...</h2>

    </div>

  </div>


  <footer>
    Made with ❤️ by Anam
  </footer>

  <script src="script.js"></script>

</body>
</html>
