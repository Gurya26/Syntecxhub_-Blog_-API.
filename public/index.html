<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>SyntecxHub Blog Platform</title>

<link rel="stylesheet" href="style.css" />

</head>

<body>

<div class="container">

<h1>🚀 SyntecxHub Blog Platform</h1>

<div class="top-bar">

<input
type="text"
id="search"
placeholder="🔍 Search blogs..."
/>

<select id="sortSelect">

<option value="newest">
Newest First
</option>

<option value="oldest">
Oldest First
</option>

</select>

<button id="themeBtn">
🌙 Theme
</button>

</div>

<form id="blogForm">

<input
type="text"
id="title"
placeholder="Enter blog title"
required
/>

<input
type="text"
id="author"
placeholder="Enter author name"
required
/>

<textarea
id="content"
placeholder="Write your blog content"
required
></textarea>

<input type="file" id="image" />

<button type="submit" id="publishBtn">
Publish Blog
</button>

</form>

<p id="message"></p>

<div id="blogs"></div>

<div class="pagination">

<button id="prevBtn">
⬅ Previous
</button>

<button id="nextBtn">
Next ➡
</button>

</div>

<footer>
Made with ❤️ by Anam | SyntecxHub Internship Project
</footer>

</div>

<script src="script.js"></script>

</body>
</html>
